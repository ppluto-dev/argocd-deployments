---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
  # Talk to the local kubelet's cAdvisor endpoint for container CPU/memory/etc.
  - apiGroups: [""]
    resources: ["nodes/metrics", "nodes/proxy"]
    verbs: ["get"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: default
data:
  config.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                # Pod must opt in via annotation.
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                # Scrape every container port whose name starts with "metrics-".
                # This produces one target per matching port, so a pod with
                # ports `metrics-app` (9464) and `metrics-tprl` (9465)
                # yields two scrape targets.
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: "metrics-.*"
                # Allow the pod to override the metrics path via annotation.
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                # Only scrape pods running on the same node as this collector
                # instance. Without this, every collector in the DaemonSet would
                # scrape every pod cluster-wide, producing N-fold duplicates.
                # NODE_NAME is injected via the Downward API on the pod spec.
                - source_labels: [__meta_kubernetes_pod_node_name]
                  action: keep
                  regex: ${env:NODE_NAME}
                # Identify which named port produced this target so dashboards
                # can distinguish e.g. `metrics-app` vs `metrics-tprl`.
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  target_label: metrics_port
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
                - source_labels: [__meta_kubernetes_pod_label_app]
                  target_label: app
                - source_labels: [__meta_kubernetes_pod_node_name]
                  target_label: node

            # Pod-level resource metrics (CPU, memory, network, filesystem) from
            # the local kubelet's cAdvisor endpoint. The collector hits its own
            # node's kubelet directly via HOST_IP, so each instance only emits
            # its node's data — no duplication. Auth via the SA bearer token
            # mounted automatically by k8s.
            - job_name: kubelet-cadvisor
              scheme: https
              tls_config:
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              metrics_path: /metrics/cadvisor
              static_configs:
                - targets:
                    - "${env:HOST_IP}:10250"
              # cAdvisor metrics don't carry a node label by default; stamp the
              # collector's own node so dashboards can filter by host.
              relabel_configs:
                - target_label: node
                  replacement: ${env:NODE_NAME}

    processors:
      batch:
        send_batch_size: 200
        timeout: 5s
      resource:
        attributes:
          - key: cluster
            value: hetzner
            action: insert
          - key: location
            value: "us-east4"
            action: insert

    exporters:
      googlemanagedprometheus:
        project: "ppluto-main"

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [resource, batch]
          exporters: [googlemanagedprometheus]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: default
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      tolerations:
        - operator: Exists
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.110.0
          args: ["--config=/conf/config.yaml"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/key.json
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 500Mi
          volumeMounts:
            - name: config
              mountPath: /conf
            - name: gcp-sa
              mountPath: /var/secrets/google
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: gcp-sa
          secret:
            secretName: otel-gmp-writer
