            - name: MYSQL_READ_ONLY_URL
              valueFrom:
                secretKeyRef:
                  name: ppluto-db-secret
                  key: MYSQL_READ_ONLY_URL
                  optional: true
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "echo 'preStop hook creating stamp file in /tmp...' >&2; touch /tmp/sigterm_received.stamp"]
          resources:
            requests:
              cpu: 0.5
              memory: 2Gi
            limits:
              cpu: 3
              memory: 4Gi
              ephemeral-storage: 7Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5096
            failureThreshold: 5
            periodSeconds: 300
          startupProbe:
            httpGet:
              path: /health
              port: 5096
            failureThreshold: 180
            periodSeconds: 10


---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ppluto-main-temporal-worker-pdb
spec:
  maxUnavailable: 5
  selector:
    matchLabels:
      app: ppluto-main-temporal-worker
