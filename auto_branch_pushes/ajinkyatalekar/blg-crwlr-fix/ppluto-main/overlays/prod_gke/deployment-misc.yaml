kind: Deployment
apiVersion: apps/v1
metadata:
  name: ppluto-main-misc
spec:
  selector:
    matchLabels:
      app: ppluto-main-misc
  replicas: 1
  template:
    metadata:
      labels:
        app: ppluto-main-misc
    spec:
      terminationGracePeriodSeconds: 60 # https://jenakim47.tistory.com/80
      containers:
        - name: ppluto-main--prod-misc
          image: registry.gitlab.com/ppluto-dev/ppluto-main/prod-server:25566437b77cc17497c729c7905e1a9c39b8815b762a91068f3cdfb8116d5140
          env:
            - name: PPLUTO_SERVER_ARG_SERVER
              value: misc
            - name: TEST_K8S_SECRET
              valueFrom:
                secretKeyRef:
                  name: ppluto-test-secret
                  key: TEST_K8S_SECRET
            - name: MYSQL_READ_WRITE_URL
              valueFrom:
                secretKeyRef:
                  name: ppluto-db-secret
                  key: MYSQL_READ_WRITE_URL
                  optional: true
            - name: MYSQL_READ_ONLY_URL
              valueFrom:
                secretKeyRef:
                  name: ppluto-db-secret
                  key: MYSQL_READ_ONLY_URL
                  optional: true
          resources:
            requests:
              cpu: 200m
            limits:
              cpu: 1000m
              memory: 3Gi
              ephemeral-storage: 9Gi
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 60"]

      imagePullSecrets:
        - name: gitlab-container-registry

---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ppluto-main-wsrv
spec:
  selector:
    matchLabels:
      app: ppluto-main-wsrv
  replicas: 2
  template:
    metadata:
      labels:
        app: ppluto-main-wsrv
    spec:
      terminationGracePeriodSeconds: 60 # https://jenakim47.tistory.com/80
      containers:
        - name: ppluto-main--prod-misc
          image: registry.gitlab.com/ppluto-dev/ppluto-main/prod-server:25566437b77cc17497c729c7905e1a9c39b8815b762a91068f3cdfb8116d5140
          env:
            - name: PPLUTO_SERVER_ARG_SERVER
              value: wsrv
            - name: TEST_K8S_SECRET
              valueFrom:
                secretKeyRef:
                  name: ppluto-test-secret
                  key: TEST_K8S_SECRET
          ports:
            - containerPort: 5088
          readinessProbe:
            httpGet:
              path: /wsrvProxy/?url=https://upload.wikimedia.org/wikipedia/en/8/80/Wikipedia-logo-v2.svg
              port: 5088
            # TODO: The pod is frequently reported as not responding for an unknown reason.
            #       Maybe it's a false warning so disable livenessProbe to test that.
            # livenessProbe:
            #   httpGet:
            #     path: /wsrvProxy/?url=https://upload.wikimedia.org/wikipedia/en/8/80/Wikipedia-logo-v2.svg
            #     port: 5088
          resources:
            requests:
              cpu: 100m
            limits:
              cpu: 1000m
              memory: 3Gi
              ephemeral-storage: 5Gi
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 60"]

      imagePullSecrets:
        - name: gitlab-container-registry
