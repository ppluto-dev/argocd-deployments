kind: Rollout
apiVersion: argoproj.io/v1alpha1
metadata:
  name: ppluto-main
  labels:
    app.kubernetes.io/name: ppluto-main
spec:
  selector:
    matchLabels:
      app: ppluto-main
      app.kubernetes.io/name: ppluto-main
  replicas: 0
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app: ppluto-main
        app.kubernetes.io/name: ppluto-main
    spec:
      topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: "kubernetes.io/hostname"
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: ppluto-main
          matchLabelKeys:
            - pod-template-hash
      terminationGracePeriodSeconds: 900 # 15min https://jenakim47.tistory.com/80

      containers:
        - name: ppluto-main--prod-server
          image: registry.gitlab.com/ppluto-dev/ppluto-main/prod-server:d2ba4e00b06e22efd3f28b613c902d0265a4f70f9e0602c5040d08bb1dd942a6
          env:
            - name: PPLUTO_SERVER_ARG_SERVER
              value: api-server
            - name: PLUTO_THETERMINALX_COM_DOMAIN
              value: daniel--pipeline-leak-fix---theterminalx.auto-branch-pushes.ppluto-main.ppluto.dev
            - name: TEST_K8S_SECRET
              valueFrom:
                secretKeyRef:
                  name: ppluto-test-secret
                  key: TEST_K8S_SECRET
            - name: PLUTO_MYSQL_READ_WRITE_URL
              valueFrom:
                secretKeyRef:
                  name: ppluto-db-secret
                  key: MYSQL_READ_WRITE_URL
                  optional: true
            - name: PLUTO_MYSQL_READ_ONLY_URL
              valueFrom:
                secretKeyRef:
                  name: ppluto-db-secret
                  key: MYSQL_READ_ONLY_URL
                  optional: true
            # Overrides the localhost value baked in via .env (k8s env wins
            # over dotenv). Store id needs no override — same everywhere.
            - name: PLUTO_OPENFGA_API_URL
              value: http://ppluto-openfga-service:8080
          ports:
            - containerPort: 81
            - containerPort: 82
            - containerPort: 83
            - containerPort: 84
            - name: metrics
              containerPort: 9464
          readinessProbe:
            # TODO: Implement gRPC health check instead. https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#probe-check-methods
            tcpSocket:
              port: 82
          # TODO: Enable `livenessProbe`.  Temporarily disabled to debug container crash issue.
          # livenessProbe:
          #   tcpSocket:
          #     port: 82
          resources:
            requests:
              cpu: 0.5
              memory: 2Gi
            limits:
              cpu: 2
              memory: 4Gi
              ephemeral-storage: 8Gi
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 1800"]
        - name: ppluto-main--prod-client-tickerbell
          image: registry.gitlab.com/ppluto-dev/ppluto-main/prod-client-tickerbell:7f5e2e935f2e7172ece58f4f189ae98fa39a9b19508b2ebb7509905b3d55006c
          ports:
            - containerPort: 5095
          readinessProbe:
            httpGet:
              port: 5095
              path: /healthz
            # The k8s default `timeoutSeconds: 1` caused flapping readiness on
            # slower nodes; keep an explicit margin even on the cheap endpoint.
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              port: 5095
              path: /healthz
            timeoutSeconds: 5
            # Liveness failure restarts the container, so be far more
            # forgiving than readiness (which only pauses traffic).
            failureThreshold: 6
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 0.5
              memory: 256Mi
            limits:
              cpu: 2
              memory: 512Mi
              ephemeral-storage: 1Gi
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 1800"]
        - name: ppluto-main--prod-client
          image: registry.gitlab.com/ppluto-dev/ppluto-main/prod-client:cd343ef7a280205b6aba3aa3d07fe63f993888256a885446f4cc9a0539bb31d5
          ports:
            - containerPort: 5280
          resources:
            requests:
              cpu: 40m
              memory: 16Mi
            limits:
              cpu: 200m
              memory: 32Mi
              ephemeral-storage: 1Gi
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 1800"]

      imagePullSecrets:
        - name: gitlab-container-registry
  strategy:
    blueGreen:
      activeService: ppluto-main-service-active
      previewService: ppluto-main-service-preview
      autoPromotionEnabled: true

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ppluto-main-pdb
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: ppluto-main
