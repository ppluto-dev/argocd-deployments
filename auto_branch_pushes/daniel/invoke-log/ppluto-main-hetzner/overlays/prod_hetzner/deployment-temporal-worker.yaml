---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ppluto-main-temporal-worker-hetzner
  namespace: default
spec:
  selector:
    matchLabels:
      app: ppluto-main-temporal-worker-hetzner
  replicas: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 100%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ppluto-main-temporal-worker-hetzner
      annotations:
        prometheus.io/scrape: 'true'
    spec:
      terminationGracePeriodSeconds: 600
      imagePullSecrets:
        - name: gitlab-container-registry
      tolerations:
        - key: "node.pluto.co/purpose"
          operator: "Equal"
          value: "temporal"
          effect: "NoSchedule"
      nodeSelector:
        node.pluto.co/purpose: temporal
      containers:
        - name: ppluto-main-temporal-worker-hetzner
          image: registry.gitlab.com/ppluto-dev/ppluto-main/prod-server:023e1ed77dedd59822474df5a23fa6593898a81b23fa33772ead047424ce882a
          ports:
            - name: metrics-app
              containerPort: 9464
            - name: metrics-tprl
              containerPort: 9465
          env:
            - name: PPLUTO_SERVER_ARG_SERVER
              value: api-server
            - name: IS_LOCAL_CRONJOB
              value: "true"
            - name: IS_TEMPORAL_WORKER
              value: "true"
            - name: TEMPORAL_TELEMETRY_ENABLED
              value: "true"
            - name: TEMPORAL_WORKER_QUEUE
              value: "MAIN_HETZNER_TEST"
            - name: MALLOC_ARENA_MAX
              value: "4"
            - name: NODE_ENV
              value: "production"
            - name: PLUTO_MYSQL_READ_WRITE_URL
              valueFrom:
                secretKeyRef:
                  name: ppluto-db-secret
                  key: MYSQL_READ_WRITE_URL
            - name: PLUTO_MYSQL_READ_ONLY_URL
              valueFrom:
                secretKeyRef:
                  name: ppluto-db-secret
                  key: MYSQL_READ_ONLY_URL
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "echo 'preStop hook creating stamp file in /tmp...' >&2; touch /tmp/sigterm_received.stamp"]
          resources:
            requests:
              cpu: 1
              memory: 2Gi
            limits:
              cpu: 3
              memory: 4Gi
              ephemeral-storage: 7Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5096
            failureThreshold: 5
            periodSeconds: 300
          startupProbe:
            httpGet:
              path: /health
              port: 5096
            failureThreshold: 180
            periodSeconds: 10
