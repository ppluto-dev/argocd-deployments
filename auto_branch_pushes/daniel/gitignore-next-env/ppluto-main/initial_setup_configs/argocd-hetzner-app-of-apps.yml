# App-of-apps that watches argocd_app_configs/hetzner/ in the argocd-deployments
# repo and creates child Applications (e.g. main----hetzner) from whatever
# manifest files live there. Sibling to the ppluto-dev app-of-apps, which
# watches argocd_app_configs/gke/.
#
# This Application itself lives on GKE (destination.server points at GKE's
# own API). It creates child Application resources in GKE's argocd namespace.
# Each child's destination may target a different cluster (e.g. the hetzner
# child uses destination.name=hetzner-temporal, which must be a cluster
# pre-registered via a Secret with label
# argocd.argoproj.io/secret-type=cluster in GKE's argocd namespace).
#
# Applied once by hand to GKE:
#   kubectl apply -f argocd-hetzner-app-of-apps.yml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ppluto-dev-hetzner
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: argocd_app_configs/hetzner
    repoURL: https://github.com/ppluto-dev/argocd-deployments.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
