---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: default
data:
  config.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                # Pod must opt in via annotation.
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                # Scrape every container port whose name starts with "metrics-".
                # This produces one target per matching port, so a pod with
                # ports `metrics-app` (9464) and `metrics-temporal` (9465)
                # yields two scrape targets.
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: "metrics-.*"
                # Allow the pod to override the metrics path via annotation.
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                # Identify which named port produced this target so dashboards
                # can distinguish e.g. `metrics-app` vs `metrics-temporal`.
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  target_label: metrics_port
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
                - source_labels: [__meta_kubernetes_pod_label_app]
                  target_label: app

    processors:
      batch:
        send_batch_size: 200
        timeout: 5s
      resource:
        attributes:
          - key: cluster
            value: hetzner
            action: insert
          - key: location
            value: global
            action: insert

    exporters:
      googlemanagedprometheus:
        project: "{{ .GCP_PROJECT_ID }}"

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [resource, batch]
          exporters: [googlemanagedprometheus]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: default
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      tolerations:
        - operator: Exists
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:{{ .OTEL_COLLECTOR_IMAGE_TAG }}
          args: ["--config=/conf/config.yaml"]
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/key.json
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 500Mi
          volumeMounts:
            - name: config
              mountPath: /conf
            - name: gcp-sa
              mountPath: /var/secrets/google
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: gcp-sa
          secret:
            secretName: otel-gmp-writer
